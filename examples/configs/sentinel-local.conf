# Sentinel Configuration - Local Mode
# For use with: systemctl enable sentinel@local
#
# This configuration runs Sentinel in local mode, querying witnesses directly
# instead of using a remote watcher network.

name: sentinel-db-local
alias: sentinel-local
bran: "YourPasscodeHere123456"  # 22 character passcode - CHANGE THIS!

base: /var/lib/sentinel/local
export_dir: /usr/local/sentinel/local

logfile: /var/log/sentinel/local.log
loglevel: INFO

local: true  # Use local witness querying
uxd: false   # TCP mode
